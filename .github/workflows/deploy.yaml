name: Deploy UI Preview

on:
  push:
    branches: [ main ] # Auto-updates your website on every push
  workflow_dispatch:   # Also allows manual trigger

permissions:
  contents: write
  pages: write      # Required for GitHub Pages
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Web Version
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist   # Ensure your 'npm run build' outputs to 'dist'
          force_orphan: true
